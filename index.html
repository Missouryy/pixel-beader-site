<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Beader</title>
  <meta name="description" content="Pixel Beader helps you design bead patterns, convert photos, preview fused finishes in 3D, and export snapshots.">
  <link rel="icon" href="assets/pixel-beader-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="Pixel Beader home">
      <img src="assets/pixel-beader-icon.png" alt="" class="brand-icon">
      <span>Pixel Beader</span>
    </a>
    <nav aria-label="Main navigation">
      <a href="./support/">Support</a>
      <a href="./privacy/">Privacy</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">For iPhone and iPad</p>
        <h1>Pixel Beader</h1>
        <p class="lead">Design bead art. Preview it in 3D.</p>
        <div class="actions">
          <a class="button primary" href="./support/">Support</a>
          <a class="button secondary" href="./privacy/">Privacy</a>
        </div>
      </div>
      <div class="product-visual">
        <img class="product-screenshot" src="assets/pixel-beader-preview.png" alt="Pixel Beader running on iPad with a colorful bead pattern in the editor.">
      </div>
    </section>

    <section class="feature-band" aria-label="Features">
      <div class="feature">
        <h2>Design</h2>
        <p>Apple Pencil ready.</p>
      </div>
      <div class="feature">
        <h2>Convert</h2>
        <p>Photos to patterns.</p>
      </div>
      <div class="feature">
        <h2>Preview</h2>
        <p>3D fused view.</p>
      </div>
      <div class="feature">
        <h2>Export</h2>
        <p>Snapshots and files.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>© 2026 Pixel Beader</span>
    <span><a href="./support/">Support</a> · <a href="./privacy/">Privacy</a></span>
  </footer>
</body>
</html>
